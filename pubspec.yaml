name: channel_publisher
description: Telegram频道自动发布工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  http: 1.5.0
  path_provider: ^2.1.4
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  intl: ^0.19.0
  uuid: ^4.5.1
  crypto: ^3.0.6
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
